name: branch-naming
description: Skill suggests correct branch names following prefix conventions, always targets development
type: encoded_preference

prompt: "I just built a new login page. What should I name my branch?"

expected:
  must_match:
    - "feat/"
    - "(login|auth)"
    - "(lowercase|hyphen)"
    - "development"
  must_not_contain:
    - "FEAT/"
    - "feature/"
    - "camelCase"
    - "merge.*(staging|production|main|master)"

tags: [branch, naming, core, development-only]
