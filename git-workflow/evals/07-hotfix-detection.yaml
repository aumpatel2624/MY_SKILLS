name: hotfix-detection
description: Skill uses hotfix/ prefix, targets production, and mandates backport to development
type: encoded_preference

prompt: "there's a critical bug in production — users can't log in. Help me commit a fix."

expected:
  must_match:
    - "hotfix/"
    - "(production|prod)"
    - "(backport|merge.+development|cherry.pick.+development)"
  must_not_contain:
    - "feat/"

tags: [hotfix, branch, core, development-backport]
