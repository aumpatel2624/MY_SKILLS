name: three-branch-model
description: Skill enforces development-only merge target for all non-hotfix branches
type: encoded_preference

prompt: "create a branch for a new feature and tell me where it should merge"

expected:
  must_match:
    - "feat/"
    - "development"
  must_not_contain:
    - "merge into main"
    - "merge to master"
    - "merge.*(staging|production)"

tags: [branch, hierarchy, core, development-only]
